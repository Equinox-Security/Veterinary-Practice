name = "auto-password-register"
main = "worker.js"
compatibility_date = "2024-01-01"

# Reset codes (short-lived, auto-expiring, never touch the roster or repo).
# Create with: wrangler kv:namespace create RESET_TOKENS
# Then fill in the id below.
[[kv_namespaces]]
binding = "RESET_TOKENS"
id = "1d47c8bda08a46e19fe554ef77b74b84"

# Secrets (do NOT put these here — set via CLI, they're encrypted at rest):
#   wrangler secret put GITHUB_TOKEN
#   wrangler secret put ROSTER_PASSWORD
#   wrangler secret put RESEND_API_KEY
#   wrangler secret put RESEND_FROM
#   wrangler secret put NTFY_TOPIC   (optional)
